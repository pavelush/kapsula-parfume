name: Deploy to Test Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Deploy Frontend via Rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: 85.209.135.87
          SERVER_USER: kapsula
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
          
          # Sync frontend build
          rsync -avz --delete \
            --exclude 'uploads' \
            ./dist/ $SERVER_USER@$SERVER_HOST:/var/www/kapsula/data/www/test.kapsula-parfume.ru/

      - name: Deploy Backend via Rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: 85.209.135.87
          SERVER_USER: kapsula
        run: |
          # Sync backend files
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'uploads' \
            ./server/ $SERVER_USER@$SERVER_HOST:/var/www/kapsula/data/www/api-server/
            
      - name: Ensure Uploads Symlink
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: 85.209.135.87
          SERVER_USER: kapsula
        run: |
          ssh -i ~/.ssh/id_ed25519 $SERVER_USER@$SERVER_HOST "ln -sfn /var/www/kapsula/data/www/api-server/uploads /var/www/kapsula/data/www/test.kapsula-parfume.ru/uploads"
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: 85.209.135.87
          SERVER_USER: kapsula
        run: |
          ssh -i ~/.ssh/id_ed25519 $SERVER_USER@$SERVER_HOST "export NVM_DIR=\"\$HOME/.nvm\" && [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\" && cd /var/www/kapsula/data/www/api-server && npm ci && pm2 restart kapsula-backend --update-env || pm2 start index.js --name kapsula-backend --update-env"
