name: Deploy to Test Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Deploy to Server via Rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: 85.209.135.87
          SERVER_USER: kapsula
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
          
          # Sync all files except node_modules and .git
          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'server/node_modules' \
            --exclude '.env' \
            ./ $SERVER_USER@$SERVER_HOST:/home/kapsula/test.kapsula-parfume.ru/
            
      - name: Restart Backend with PM2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: 85.209.135.87
          SERVER_USER: kapsula
        run: |
          ssh -i ~/.ssh/id_ed25519 $SERVER_USER@$SERVER_HOST "cd /home/kapsula/test.kapsula-parfume.ru/server && npm ci && pm2 restart kapsula-backend || pm2 start index.js --name kapsula-backend"
