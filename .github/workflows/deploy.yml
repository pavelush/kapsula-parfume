name: Deploy to Production Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOY_GITHUB_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies & Build
        run: |
          npm ci
          npm run build

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Deploy Frontend via Rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts
          
          # Sync frontend build
          rsync -avz --delete \
            --exclude 'uploads' \
            ./dist/ $SERVER_USER@$SERVER_HOST:/var/www/kapsula/data/www/kapsula-parfume.ru/

      - name: Deploy Backend via Rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # Sync backend files
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'uploads' \
            --exclude 'venv' \
            ./server/ $SERVER_USER@$SERVER_HOST:/var/www/kapsula/data/www/api-server/
            
      - name: Ensure Uploads Symlink
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 $SERVER_USER@$SERVER_HOST "ln -sfn /var/www/kapsula/data/www/api-server/uploads /var/www/kapsula/data/www/kapsula-parfume.ru/uploads"

      - name: Restart Backend with PM2
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 $SERVER_USER@$SERVER_HOST "export NVM_DIR=\"\$HOME/.nvm\" && [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\" && cd /var/www/kapsula/data/www/api-server && npm ci && pm2 restart kapsula-backend --update-env || pm2 start index.js --name kapsula-backend --update-env"

      - name: Setup Python RMBG-2.0 Service
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          ssh -i ~/.ssh/id_ed25519 $SERVER_USER@$SERVER_HOST bash -s << 'REMOTE_SCRIPT'
            cd /var/www/kapsula/data/www/api-server

            # Clean up broken venv if exists
            if [ -d venv ] && [ ! -f venv/bin/pip ]; then
              echo "Found broken venv (missing pip), removing..."
              rm -rf venv
            fi

            # Create Python venv if not exists
            if [ ! -d venv ]; then
              echo "Creating virtual environment..."
              python3 -m venv venv || {
                echo "python3 -m venv failed. Trying to install python3-venv using sudo -n..."
                sudo -n apt-get update -y && sudo -n apt-get install -y python3-venv && python3 -m venv venv
              } || {
                echo "Sudo installation failed. Trying to install virtualenv via pip..."
                python3 -m pip install --user --upgrade pip virtualenv
                python3 -m virtualenv venv
              }
            fi

            # Install Python dependencies
            ./venv/bin/pip install -q -r requirements.txt

            # Write HF_TOKEN to .env (remove old line if present to update value)
            touch .env
            sed -i '/^HF_TOKEN=/d' .env
            echo "HF_TOKEN=${HF_TOKEN}" >> .env

            # Set HF_HOME for model caching
            sed -i '/^HF_HOME=/d' .env
            echo "HF_HOME=/var/www/kapsula/data/www/api-server/.hf_cache" >> .env

            # Source .env and start/restart the RMBG service
            set -a; source .env; set +a
            export HF_TOKEN HF_HOME

            pm2 describe rmbg-service > /dev/null 2>&1 && pm2 delete rmbg-service
            HF_TOKEN="$HF_TOKEN" HF_HOME="$HF_HOME" pm2 start ecosystem.rmbg.config.js
            pm2 save
          REMOTE_SCRIPT
